name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  lint-and-test:
    name: Lint & test (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Node.js (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install npm dependencies
        run: npm ci

      - name: cargo fmt --check
        run: cargo fmt --all --manifest-path src-tauri/Cargo.toml -- --check

      - name: Clippy (deny warnings)
        run: just clippy

      - name: cargo check
        run: just check-rust

      - name: Cargo tests
        run: just test-rust

      - name: Frontend lint
        run: just lint

      - name: Frontend type-check
        run: just check-ui

      - name: Frontend tests (Vitest)
        run: just test-ui

  openspec-validate:
    name: OpenSpec validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install OpenSpec CLI
        run: npm install -g @fission-ai/openspec

      - name: Validate all active changes (strict)
        run: |
          set -euo pipefail
          if [ ! -d openspec/changes ]; then
            echo "No openspec/changes directory; nothing to validate."
            exit 0
          fi
          shopt -s nullglob
          failed=0
          for dir in openspec/changes/*/; do
            change="$(basename "$dir")"
            # Skip the archive directory
            if [ "$change" = "archive" ]; then continue; fi
            echo "::group::openspec validate $change --strict"
            if ! openspec validate "$change" --strict; then
              failed=1
            fi
            echo "::endgroup::"
          done
          if [ "$failed" -ne 0 ]; then
            echo "One or more OpenSpec changes failed --strict validation."
            exit 1
          fi

  security-audit:
    name: Security audit (cargo + npm)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: cargo audit (vulnerabilities fail; warnings informational)
        run: cargo audit --file src-tauri/Cargo.lock

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: npm audit (prod deps, level=high)
        run: npm audit --omit=dev --audit-level=high

  tauri-build-smoke:
    name: Tauri smoke build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: tauri-smoke

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Tauri build (no bundle)
        run: npm run tauri build -- --no-bundle
